name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: SMK-01 … SMK-08
        run: bash scripts/smoke.sh

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: SMK-10 / SMK-11 (UDP stub + survey binary)
        run: go test ./cmd/survey -tags=integration -count=1 -timeout 3m
